<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>

body{
background-color:#f2f2f2;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{
background:#222;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #000;
text-align:center;
}

#display{
width:260px;
height:45px;
font-size:22px;
margin-bottom:10px;
text-align:right;
padding:5px;
border-radius:5px;
border:none;
}

button{
width:60px;
height:50px;
font-size:18px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
}

.number{
background:#4CAF50;
color:white;
}

.operator{
background:#2196F3;
color:white;
}

.equal{
background:#ff9800;
color:white;
}

.clear{
background:#f44336;
color:white;
}

button:hover{
opacity:0.8;
}

h2{
color:white;
}

</style>

</head>

<body>

<div class="calculator">

<h2>Calculator</h2>

<input type="text" id="display" readonly><br>

<button class="number" onclick="press('7')">7</button>
<button class="number" onclick="press('8')">8</button>
<button class="number" onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">/</button><br>

<button class="number" onclick="press('4')">4</button>
<button class="number" onclick="press('5')">5</button>
<button class="number" onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">*</button><br>

<button class="number" onclick="press('1')">1</button>
<button class="number" onclick="press('2')">2</button>
<button class="number" onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">-</button><br>

<button class="number" onclick="press('0')">0</button>
<button class="operator" onclick="press('.')">.</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="press('+')">+</button><br>

<button class="clear" onclick="clearDisplay()" style="width:250px">Clear</button>

</div>

<script>

function press(num){
document.getElementById("display").value += num;
}

function calculate(){
let result=document.getElementById("display").value;
document.getElementById("display").value=eval(result);
}

function clearDisplay(){
document.getElementById("display").value="";
}

</script>

</body>
</html>
